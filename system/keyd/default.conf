[ids]

*

[main]

# Tap left Super alone -> keycode F13 (surfaces as XF86Tools keysym; niri binds it to the launcher).
# Hold left Super -> normal Super modifier, so all Mod+... binds still work.
leftmeta = overload(meta, f13)

#Maps capslock to escape when pressed and control when held
#
capslock = overload(capslock_layer, esc)
esc = capslock

[capslock_layer]
h = left
j = down
k = up 
l = right
q = M-q
w = C-x
e = C-c 
r = C-v 
s = C-z 
d = C-y 
backspace = C-backspace
enter = M-enter

# Caps+<number> -> Super+<number>
1 = M-1
2 = M-2
3 = M-3
4 = M-4
5 = M-5
6 = M-6
7 = M-7
8 = M-8
9 = M-9
0 = M-0
